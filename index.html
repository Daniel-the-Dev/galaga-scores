<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaga High Scores</title>

<!-- Pixel Font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: black;
    color: #00ffcc;
    overflow: hidden;
    text-align: center;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  h1 {
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
    margin-top: 20px;
  }

  .container {
    margin-top: 20px;
  }

  input {
    width: 60px;
    text-align: center;
    text-transform: uppercase;
    font-size: 18px;
  }

  button {
    font-family: 'Press Start 2P';
    background: #ffcc00;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
  }

  table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 320px;
  }

  th, td {
    border: 2px solid #00ffcc;
    padding: 8px;
  }

  tr:nth-child(1) {
    color: gold;
  }

  tr:nth-child(2) {
    color: silver;
  }

  tr:nth-child(3) {
    color: #cd7f32;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<h1>🚀 GALAGA HIGH SCORES</h1>

<div class="container">
  <input id="initials" maxlength="3" placeholder="AAA">
  <input id="score" type="number" placeholder="0000">
  <br>
  <button onclick="addScore()">INSERT COIN</button>
</div>

<table>
  <thead>
    <tr>
      <th>RANK</th>
      <th>NAME</th>
      <th>SCORE</th>
    </tr>
  </thead>
  <tbody id="board"></tbody>
</table>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let scores = JSON.parse(localStorage.getItem('galagaScores')) || [];

function saveScores() {
  localStorage.setItem('galagaScores', JSON.stringify(scores));
}

function render() {
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 10);

  const board = document.getElementById('board');
  board.innerHTML = '';

  scores.forEach((s, i) => {
    board.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${s.name}</td>
        <td>${s.score}</td>
      </tr>
    `;
  });
}

function addScore() {
  const name = document.getElementById('initials').value.toUpperCase();
  const score = parseInt(document.getElementById('score').value);

  if (name.length !== 3 || isNaN(score)) {
    alert('ENTER 3 LETTERS + SCORE');
    return;
  }

  document.getElementById('beep').play();

  scores.push({ name, score });
  saveScores();
  render();

  document.getElementById('initials').value = '';
  document.getElementById('score').value = '';
}

render();


// ⭐ STARFIELD BACKGROUND ⭐
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length: 100}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  size: Math.random() * 2,
  speed: Math.random() * 1
}));

function animate() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";

  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, s.size, s.size);
    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

animate();


// 📡 OPTIONAL FIREBASE (UNCOMMENT + CONFIGURE)
/*
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";

  const snapshot = await getDocs(collection(db, "scores"));
  scores = snapshot.docs.map(doc => doc.data());
  render();
}
*/
</script>

</body>
</html>
